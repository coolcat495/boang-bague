<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bisou Bijoux | Edelsteen Sieraden</title>
    <style>
        :root {
            --bg: #fdfaf6; /* Zacht crème/wit voor zen gevoel */
            --accent: #c5b4a2; /* Rustige zandkleur */
            --text: #4a4a4a;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 10%;
            background: var(--bg);
            letter-spacing: 2px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 300;
            text-transform: lowercase; /* Voor een zachtere look */
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .nav-links li { cursor: pointer; transition: 0.3s; }
        .nav-links li:hover { color: var(--accent); }

        .hero {
            text-align: center;
            padding: 60px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 { font-weight: 200; font-size: 2.2rem; margin-bottom: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--white);
            padding: 40px 20px;
            text-align: center;
            border-radius: 8px;
            transition: 0.5s;
            border: 1px solid #f0efeb;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.02); }

        .gem { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .name { font-size: 1.3rem; margin: 10px 0; font-weight: 300; }
        .price { display: block; margin-bottom: 20px; font-style: italic; }

        button {
            background: none;
            border: 1px solid var(--accent);
            padding: 8px 30px;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            transition: 0.4s;
        }

        button:hover { background: var(--accent); color: white; }

        #cart-count { margin-left: 5px; font-weight: bold; color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade { animation: fadeIn 1.5s; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">bisou bijoux</div>
        <ul class="nav-links">
            <li onclick="filter('all')">Alles</li>
            <li onclick="filter('ring')">Ringen</li>
            <li onclick="filter('armband')">Armbanden</li>
            <li onclick="filter('ketting')">Kettingen</li>
        </ul>
        <div>Mandje <span id="cart-count">0</span></div>
    </nav>

    <section class="hero fade">
        <h1>Natuurlijke Balans</h1>
        <p>Ontdek onze collectie met zorgvuldig gekozen edelsteentjes.</p>
    </section>

    <div id="shop" class="grid fade"></div>

    <script>
        const producten = [
            { naam: "Amethist Ring", type: "ring", prijs: 3, steen: "Lila Edelsteen" },
            { naam: "Rozenkwarts Ketting", type: "ketting", prijs: 5, steen: "Roze Edelsteen" },
            { naam: "Jade Armband", type: "armband", prijs: 4, steen: "Groene Edelsteen" },
            { naam: "Maansteen Ring", type: "ring", prijs: 3, steen: "Witte Edelsteen" },
            { naam: "Lapis Lazuli Ketting", type: "ketting", prijs: 5, steen: "Blauwe Edelsteen" },
            { naam: "Tijgeroog Armband", type: "armband", prijs: 4, steen: "Bruine Edelsteen" }
        ];

        let count = 0;

        function toon(lijst) {
            const shop = document.getElementById('shop');
            shop.innerHTML = "";
            lijst.forEach(p => {
                shop.innerHTML += `
                    <div class="card">
                        <div class="gem">${p.steen}</div>
                        <div class="name">${p.naam}</div>
                        <span class="price">€${p.prijs},-</span>
                        <button onclick="add()">In Mandje</button>
                    </div>
                `;
            });
        }

        function add() {
            count++;
            document.getElementById('cart-count').innerText = count;
        }

        function filter(t) {
            t === 'all' ? toon(producten) : toon(producten.filter(p => p.type === t));
        }

        window.onload = () => toon(producten);
    </script>
</body>
</html>
